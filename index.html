<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIT Silchar L&F | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 p-6 flex flex-col fixed h-full">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-black p-2 rounded-lg"><i class="fas fa-search text-white"></i></div>
            <h1 class="font-bold text-lg tracking-tight">NIT Silchar L&F</h1>
        </div>
        <nav class="space-y-1 flex-1">
            <a href="#" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl font-medium"><i class="fas fa-home"></i> Home</a>
            <a href="#" class="nav-item flex items-center gap-3 px-4 py-3 text-gray-500 rounded-xl transition"><i class="fas fa-list"></i> All Reports</a>
            <a href="#" class="nav-item flex items-center gap-3 px-4 py-3 text-gray-500 rounded-xl transition"><i class="fas fa-th-large"></i> Dashboard</a>
        </nav>
    </aside>

    <main class="flex-1 ml-64 overflow-y-auto">
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
            <input type="text" id="searchInput" placeholder="Search for items..." class="w-1/2 pl-12 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-full outline-none focus:ring-2 focus:ring-blue-500">
            <div class="flex items-center gap-4">
                <div class="text-right text-xs"><p class="font-bold">Nitish Kumar</p><p class="text-gray-500">CSE '29</p></div>
                <img src="https://ui-avatars.com/api/?name=Nitish+Kumar&background=2563eb&color=fff" class="w-10 h-10 rounded-full">
            </div>
        </header>

        <div class="p-8 flex gap-8">
            <div class="flex-1 space-y-8">
                <div class="bg-blue-600 rounded-[2.5rem] p-10 text-white shadow-xl shadow-blue-100">
                    <h2 class="text-5xl font-bold mb-4">Find what you<br>lost.</h2>
                    <p class="text-blue-100 mb-8 max-w-sm">Recover missing items instantly through our campus matching system.</p>
                    <button id="openModalBtn" class="bg-white text-gray-900 px-8 py-3 rounded-xl font-bold hover:scale-105 transition-transform">Report Item</button>
                </div>

                <section>
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="section-heading">Recent Reports</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-6" id="reportsGrid">
                        <div class="animate-pulse bg-gray-200 h-40 rounded-2xl"></div>
                        <div class="animate-pulse bg-gray-200 h-40 rounded-2xl"></div>
                    </div>
                </section>
            </div>

            <div class="w-80 space-y-8">
                <h3 class="section-heading">Campus Status</h3>
                <div class="bg-blue-50 h-48 rounded-[2rem] border border-blue-100 p-6 flex items-end">
                    <p class="text-[10px] font-black text-blue-900 uppercase">NIT Silchar Hotspots</p>
                </div>
            </div>
        </div>
    </main>

    <div id="reportModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl">
            <h2 class="text-3xl font-black mb-6">Report Item</h2>
            <form id="itemForm" class="space-y-4">
                <input type="text" id="itemTitle" required placeholder="Item Name" class="form-input">
                <select id="itemType" class="form-input">
                    <option value="lost">Lost</option>
                    <option value="found">Found</option>
                </select>
                <input type="text" id="itemLocation" required placeholder="Where was it last seen?" class="form-input">
                <textarea id="itemDesc" placeholder="Additional details..." class="form-input h-24"></textarea>
                <div class="flex gap-4 pt-4">
                    <button type="button" id="closeModalBtn" class="flex-1 py-4 font-bold text-gray-500">Cancel</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
 <div id="reportModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md"></div>
    
    <div class="relative bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl scale-95 transition-all duration-300">
        <button id="closeModalBtn" class="absolute top-8 right-8 text-gray-400 hover:text-gray-600">
            <i class="fas fa-times text-xl"></i>
        </button>

        <h2 class="text-3xl font-black text-gray-800 mb-2">Report an Item</h2>
        <p class="text-gray-500 mb-8 font-medium text-sm uppercase tracking-wide">NIT Silchar Lost & Found</p>

        <form id="itemForm" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Item Name</label>
                    <input type="text" id="itemTitle" required 
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition" 
                        placeholder="e.g. MacBook Pro">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Type</label>
                    <select id="itemType" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none appearance-none cursor-pointer">
                        <option value="lost">Lost</option>
                        <option value="found">Found</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Location Last Seen</label>
                <input type="text" id="itemLocation" required 
                    class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition" 
                    placeholder="e.g. CC3 or Library">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">Description</label>
                <textarea id="itemDesc" rows="3" 
                    class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition resize-none" 
                    placeholder="Describe color, brand, or unique stickers..."></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-5 rounded-[1.5rem] hover:bg-blue-700 transition-all shadow-xl shadow-blue-200 active:scale-[0.98]">
                Submit Report
            </button>
        </form>
    </div>
</div>
</body>
</html>
