<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Lost & Found</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>NIT Silchar L&F</h2>
  <ul>
    <li class="active">🏠 Home</li>
    <li>📋 All Reports</li>
    <li>➕ Report Item</li>
    <li>📊 Dashboard</li>
    <li>👤 Profile</li>
    <li>⚙️ Settings</li>
  </ul>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Top Bar -->
  <div class="topbar">
    <input type="text" placeholder="Search for ID cards, keys, laptops...">
    <div class="user">Nitish Kumar</div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <div>
      <h1>Find what you lost.</h1>
      <p>Connecting NIT Silchar students to recover items instantly.</p>
      <button onclick="addItem()">Report Lost</button>
    </div>
  </div>

  <!-- Items -->
  <h3>Recent Reports</h3>
  <div id="items" class="items"></div>

</div>

<!-- Right Panel -->
<div class="right">

  <h3>⚡ AI Match Suggestions</h3>

  <div class="suggestion">
    <h4>ID Card</h4>
    <p style="color:green;">98% Match</p>
  </div>

  <div class="suggestion">
    <h4>Black Keyring</h4>
    <p style="color:green;">74% Match</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
